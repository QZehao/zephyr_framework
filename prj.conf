# Minimal configuration - let board defconfig handle SOC selection

# =============================================================================
# SRAM1/SRAM2/SRAM3 内存利用（STM32L4R5ZI）
# =============================================================================
#
# 使用 Zephyr Kconfig 配置 SRAM 分区
# nucleo_l4r5zi：640KB 连续 SRAM 在 boards/nucleo_l4r5zi.overlay（该板自动合并，勿只留 settings 而丢 SRAM）
# 其它板：无 boards/<board>.overlay 时才会自动合并根目录 app.overlay（见 docs/设备树与内存配置手册.md）
#
CONFIG_SHELL=y

# Enable Zephyr logger output to UART console.
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3
CONFIG_LOG_MAX_LEVEL=3
CONFIG_LOG_OVERRIDE_LEVEL=3
CONFIG_SYS_LOG_LEVEL=3
CONFIG_LOG_RUNTIME_FILTERING=n
CONFIG_KERNEL_LOG_LEVEL_ERR=y
CONFIG_ARCH_LOG_LEVEL_ERR=y
CONFIG_MPU_LOG_LEVEL_OFF=y
CONFIG_LOG_MODE_IMMEDIATE=y
CONFIG_LOG_BACKEND_UART=y
# 关闭内核DEBUG编译选项（最核心）
CONFIG_DEBUG=n

CONFIG_CONSOLE=y
CONFIG_SERIAL=y
CONFIG_UART_CONSOLE=y
CONFIG_PRINTK=y
CONFIG_BOOT_BANNER=n
CONFIG_ASSERT=y
CONFIG_EARLY_CONSOLE=y
# =============================================================================
# Kernel heap（事件系统 event_create / event_publish_copy 依赖 k_malloc，不可为 0）
# =============================================================================

# 增大 heap 到 64KB（默认在 SRAM3）
CONFIG_HEAP_MEM_POOL_SIZE=65536

# 启动期日志/模块初始化较重：加大主栈与工作队列栈，避免异常入栈失败
CONFIG_MAIN_STACK_SIZE=4096
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=2048

# 事件分发线程栈（默认在模块启动阶段就会创建）
CONFIG_EVENT_DISPATCHER_STACK_SIZE=4096

# sys_timer 服务的内部线程栈
# CONFIG_SYS_TIMER_STACK_SIZE=2048

# 缩减静态内存池，避免 RAM(192KB) 溢出导致早期 MPU Fault
CONFIG_SYS_MEMORY_POOL_SIZE=4096

# =============================================================================
# Thread IPC service (in-app worker + dispatcher; not Zephyr subsys IPC_SERVICE)
# =============================================================================

CONFIG_THREAD_IPC_SERVICE=y


# 与事件系统联动（需 HEAP + EVENT_SYSTEM）
CONFIG_THREAD_IPC_SERVICE_EVENT_BRIDGE=y

CONFIG_MODULE_MANAGER_RUNTIME_DEPENDENCIES=y
CONFIG_EXAMPLE_MODULE_MULTI_DEP=y

CONFIG_THREAD_IPC_SERVICE_MAX_PENDING_REQUESTS=8
CONFIG_THREAD_IPC_SERVICE_REQUEST_QUEUE_SIZE=6
CONFIG_THREAD_IPC_SERVICE_RESPONSE_QUEUE_SIZE=6
# 双线程各一栈；与 example_module_ipc 同开时需尽量小，避免 nucleo_l4r5zi RAM 溢出
CONFIG_THREAD_IPC_SERVICE_PRIORITY=5
CONFIG_THREAD_IPC_SERVICE_LOG_LEVEL=3

# IPC 服务线程栈（防止 IPC worker/demo 线程栈溢出）
CONFIG_THREAD_IPC_SERVICE_STACK_SIZE=2048

# 内置 SYS_INIT 演示（与 example_module_ipc 二选一开启可省 RAM）
CONFIG_THREAD_IPC_SERVICE_EXAMPLE=n
# 与 module_manager 集成的示例（默认关，需要时改为 y 或合并 prj_example_module_ipc.conf）
CONFIG_EXAMPLE_MODULE_THREAD_IPC=y
CONFIG_EXAMPLE_MODULE_GPIO=y
CONFIG_EXAMPLE_MODULE_UART=y

# =============================================================================
# app_kv 掉电保存（Settings/NVS）：须先打开 Flash 子系统，否则 NVS/FLASH_MAP/SETTINGS_NVS 会全部回落为 n
# =============================================================================
CONFIG_FLASH=y

CONFIG_SETTINGS=y
CONFIG_NVS=y
CONFIG_FLASH_MAP=y
CONFIG_SETTINGS_NVS=y
CONFIG_APP_KV_PERSIST=y

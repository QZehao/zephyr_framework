# =============================================================================
# 应用 KV 存储（默认禁用，需要 Flash）
# =============================================================================

# 掉电持久化需要以下配置（见 prj_app_kv_persist.conf）：
# CONFIG_FLASH=y
# CONFIG_FLASH_MAP=y
# CONFIG_NVS=y
# CONFIG_SETTINGS=y
# CONFIG_SETTINGS_NVS=y
# CONFIG_APP_KV_PERSIST=y


# =============================================================================
# 主配置文件 - STM32L4R5ZI (Nucleo-L4R5ZI-P)
# =============================================================================
#
# 内存布局:
#   - SRAM1: 192KB @ 0x20000000 (.data/.bss/内核)
#   - SRAM2: 64KB  @ 0x20030000 (线程栈 + ISR 栈)
#   - SRAM3: 384KB @ 0x20040000 (Heap 64KB + 剩余可用)
#   - FLASH: 2MB   @ 0x08000000
#
# SRAM 配置在 boards/nucleo_l4r5zi.overlay（640KB 连续 SRAM）
# =============================================================================

# =============================================================================
# 基础系统配置
# =============================================================================

# 调试与控制台
CONFIG_SHELL=y
CONFIG_CONSOLE=y
CONFIG_SERIAL=y
CONFIG_UART_CONSOLE=y
CONFIG_PRINTK=y
CONFIG_EARLY_CONSOLE=y
CONFIG_BOOT_BANNER=n

# 日志系统
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3
CONFIG_LOG_MAX_LEVEL=3
CONFIG_LOG_OVERRIDE_LEVEL=3
CONFIG_LOG_RUNTIME_FILTERING=n
CONFIG_LOG_MODE_IMMEDIATE=y
CONFIG_LOG_BACKEND_UART=y

# 内核日志级别控制
CONFIG_KERNEL_LOG_LEVEL_ERR=y
CONFIG_ARCH_LOG_LEVEL_ERR=y
CONFIG_MPU_LOG_LEVEL_OFF=y

# 调试选项
CONFIG_DEBUG=n
CONFIG_ASSERT=y

# =============================================================================
# 内核内存配置
# =============================================================================

# Heap 配置（64KB，位于 SRAM3）
CONFIG_HEAP_MEM_POOL_SIZE=65536

# 线程栈配置
CONFIG_MAIN_STACK_SIZE=4096
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=2048
CONFIG_EVENT_DISPATCHER_STACK_SIZE=4096

# 静态内存池（缩减以避免 RAM 溢出）
CONFIG_SYS_MEMORY_POOL_SIZE=4096

# =============================================================================
# Thread IPC 服务（应用层 IPC 框架）
# =============================================================================

CONFIG_THREAD_IPC_SERVICE=y
CONFIG_THREAD_IPC_SERVICE_EVENT_BRIDGE=y
CONFIG_THREAD_IPC_SERVICE_STACK_SIZE=2048
CONFIG_THREAD_IPC_SERVICE_PRIORITY=5
CONFIG_THREAD_IPC_SERVICE_LOG_LEVEL=3
CONFIG_THREAD_IPC_SERVICE_MAX_PENDING_REQUESTS=8
CONFIG_THREAD_IPC_SERVICE_REQUEST_QUEUE_SIZE=6
CONFIG_THREAD_IPC_SERVICE_RESPONSE_QUEUE_SIZE=6
CONFIG_THREAD_IPC_SERVICE_EXAMPLE=n

# 与 module_manager 集成的示例
CONFIG_EXAMPLE_MODULE_THREAD_IPC=y

# =============================================================================
# 示例模块（开发测试用）
# =============================================================================

CONFIG_EXAMPLE_MODULE_GPIO=y
CONFIG_EXAMPLE_MODULE_UART=y
CONFIG_EXAMPLE_MODULE_MULTI_DEP=y
CONFIG_MODULE_MANAGER_RUNTIME_DEPENDENCIES=y

# =============================================================================
# 掉电持久化（Settings/NVS/Flash）
# =============================================================================

# app_kv 掉电保存
CONFIG_APP_KV_PERSIST=y

# =============================================================================
# 商业模块
# =============================================================================

# 增强版模块管理器
CONFIG_MODULE_MANAGER_PRO=y

# 增强版事件系统
CONFIG_EVENT_SYSTEM_PRO=y

# Mesh 通信模块
# 自动启用：NETWORKING, NET_IP, NET_IPV4, NET_SOCKETS, NET_TCP,
#          TEST_RANDOM_GENERATOR, ENTROPY_GENERATOR
CONFIG_MESH_COMMUNICATION=y

# 加密安全套件
CONFIG_SECURITY_CRYPTO=y

# OTA 升级管理
CONFIG_OTA_MANAGER=y

# USB Host CDC ECM（5G/LTE 模块支持）
# 自动启用：USB_HOST_STACK
CONFIG_CELLULAR_USB_HOST_CDC_ECM=y

# =============================================================================
# 可选模块（需要时启用）
# =============================================================================

# USB Host RNDIS（5G 模块支持）
# CONFIG_USB_HOST_RNDIS=y

# Mesh Thread 链路
# CONFIG_MESH_LINK_THREAD=y

# Mesh Zigbee 链路
# CONFIG_MESH_LINK_ZIGBEE=y

# 模块持久化存储（需要时启用）
# CONFIG_MODULE_MANAGER_PRO_PERSIST=y
# CONFIG_EVENT_PRO_PERSIST=y

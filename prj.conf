# Minimal configuration - let board defconfig handle SOC selection

# =============================================================================
# SRAM1/SRAM2/SRAM3 内存利用（STM32L4R5ZI）
# =============================================================================
#
# 使用 Zephyr Kconfig 配置 SRAM 分区
# boards/app.overlay 已配置 640KB 连续 SRAM 区域
#
CONFIG_SHELL=y
# =============================================================================
# Kernel heap（事件系统 event_create / event_publish_copy 依赖 k_malloc，不可为 0）
# =============================================================================

# 增大 heap 到 64KB（默认在 SRAM3）
CONFIG_HEAP_MEM_POOL_SIZE=65536

CONFIG_SYS_LOG_LEVEL=4

# =============================================================================
# Thread IPC service (in-app worker + dispatcher; not Zephyr subsys IPC_SERVICE)
# =============================================================================

CONFIG_THREAD_IPC_SERVICE=y

# 内置 SYS_INIT 演示（与 example_module_ipc 二选一开启可省 RAM）
CONFIG_THREAD_IPC_SERVICE_EXAMPLE=n

# 与事件系统联动（需 HEAP + EVENT_SYSTEM）
CONFIG_THREAD_IPC_SERVICE_EVENT_BRIDGE=y

CONFIG_MODULE_MANAGER_RUNTIME_DEPENDENCIES=y
CONFIG_EXAMPLE_MODULE_MULTI_DEP=y

CONFIG_THREAD_IPC_SERVICE_MAX_PENDING_REQUESTS=8
CONFIG_THREAD_IPC_SERVICE_REQUEST_QUEUE_SIZE=6
CONFIG_THREAD_IPC_SERVICE_RESPONSE_QUEUE_SIZE=6
# 双线程各一栈；与 example_module_ipc 同开时需尽量小，避免 nucleo_l4r5zi RAM 溢出
CONFIG_THREAD_IPC_SERVICE_STACK_SIZE=1280
CONFIG_THREAD_IPC_SERVICE_PRIORITY=5
CONFIG_THREAD_IPC_SERVICE_LOG_LEVEL=3

# 与 module_manager 集成的示例（默认关，需要时改为 y 或合并 prj_example_module_ipc.conf）
CONFIG_EXAMPLE_MODULE_THREAD_IPC=y
CONFIG_EXAMPLE_MODULE_GPIO=y
CONFIG_EXAMPLE_MODULE_UART=y

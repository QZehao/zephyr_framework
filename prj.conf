# =============================================================================
# 主配置文件 - 默认最小配置
# =============================================================================
#
# 本文件为默认配置，启用基础开源功能。
# 商业模块默认禁用（注释状态），按需在叠加配置中启用。
#
# 叠加配置示例：
#   - prj_example_module_ipc.conf：Thread IPC 示例
#   - prj_example_gpio_uart.conf：GPIO/UART 示例
#   - prj_app_kv_persist.conf：KV 持久化（需 Flash 支持）
#   - prj_sram.conf：SRAM 优化配置
#
# =============================================================================

# =============================================================================
# 基础系统配置
# =============================================================================

# 调试与控制台
CONFIG_SHELL=y
CONFIG_CONSOLE=y
CONFIG_SERIAL=y
CONFIG_UART_CONSOLE=y
CONFIG_PRINTK=y
CONFIG_EARLY_CONSOLE=y
CONFIG_BOOT_BANNER=n

# 日志系统
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3
CONFIG_LOG_MAX_LEVEL=3
CONFIG_LOG_OVERRIDE_LEVEL=3
CONFIG_LOG_RUNTIME_FILTERING=n
CONFIG_LOG_MODE_IMMEDIATE=y
CONFIG_LOG_BACKEND_UART=y

# 内核日志级别控制
CONFIG_KERNEL_LOG_LEVEL_ERR=y
CONFIG_ARCH_LOG_LEVEL_ERR=y
CONFIG_MPU_LOG_LEVEL_OFF=y

# 调试选项
CONFIG_DEBUG=n
CONFIG_ASSERT=y

# =============================================================================
# 内核内存配置
# =============================================================================

# Heap 配置（默认 64KB，可通过 prj_sram.conf 调整）
CONFIG_HEAP_MEM_POOL_SIZE=65536

# 线程栈配置
CONFIG_MAIN_STACK_SIZE=4096
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=2048
CONFIG_EVENT_DISPATCHER_STACK_SIZE=2048

# 静态内存池
CONFIG_SYS_MEMORY_POOL_SIZE=8192

# =============================================================================
# 核心功能（默认启用）
# =============================================================================

CONFIG_EVENT_SYSTEM=y
CONFIG_EVENT_QUEUE_SIZE=64
CONFIG_EVENT_MAX_SUBSCRIBERS=16
CONFIG_EVENT_DISPATCHER_PRIORITY=5

CONFIG_MODULE_MANAGER=y
CONFIG_MAX_MODULES=16

# 系统服务
CONFIG_SYS_LOG_LEVEL=3
CONFIG_SYS_LOG_ENABLE=y
CONFIG_SYS_MEMORY_ENABLE=y
CONFIG_SYS_TIMER_ENABLE=y

# =============================================================================
# 应用功能特性
# =============================================================================

CONFIG_APP_ENABLE_SHELL=y
CONFIG_APP_ENABLE_STATS=y
CONFIG_APP_ENABLE_LOG_DUMP=y
CONFIG_APP_HEARTBEAT_INTERVAL_MS=1000

# 示例模块 A/B（默认启用）
CONFIG_EXAMPLE_MODULE_A_ENABLE=y
CONFIG_EXAMPLE_MODULE_B_ENABLE=y

# =============================================================================
# 看门狗配置
# =============================================================================

CONFIG_SYS_WATCHDOG_ENABLE=y
CONFIG_SYS_WATCHDOG_TIMEOUT_MS=5000
CONFIG_SYS_WATCHDOG_FORCE_RESET=y

# =============================================================================
# Thread IPC 服务（默认禁用，按需启用）
# =============================================================================

# CONFIG_THREAD_IPC_SERVICE=y
# CONFIG_THREAD_IPC_SERVICE_EVENT_BRIDGE=y

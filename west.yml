# West manifest file for zephyr_template
#
# This is a FREESTANDING APPLICATION - the application and Zephyr are in
# separate directories. This west.yml is OPTIONAL and is only needed if you
# want to use west commands that require a workspace.
#
# For freestanding applications, you have two options:
#
# Option 1: Use ZEPHYR_BASE environment variable (recommended)
#   - Set ZEPHYR_BASE to point to your Zephyr installation
#   - Build with: west build -b <board>
#
# Option 2: Use this west.yml to create a local workspace
#   - Run: west init -l .
#   - Run: west update
#   - Build with: west build -b <board>
#
# See: https://docs.zephyrproject.org/latest/application/index.html#zephyr-freestanding-app

manifest:
  version: 0.13

  projects:
    - name: zephyr
      path: zephyr
      # Update this path to your Zephyr installation
      url: file://D:/Code/1-github-code/zephyrproject/zephyr
      # 建议改为与 CI / 本地验证一致的 tag，例如 v3.6.0，避免 main 漂移
      revision: main
      # Disable import for freestanding applications
      # import: true

  self:
    # This application is located in the manifest repository itself
    path: .

# =============================================================================
# 平衡配置 - SRAM 优化版（目标 ~40KB 静态内存）
# =============================================================================
#
# 适用场景：
#   - 中等资源 MCU（如 STM32L4 系列 64-96KB SRAM）
#   - 需要核心事件驱动 + 基础调试功能
#   - 平衡功能与资源占用
#
# 使用方法：
#   west build -b native_posix . -DCONF_FILE="prj.conf;prj_sram.conf"
#
# 配置说明：
#   - 最大 128 种事件类型
#   - 每事件类型最多 8 个订阅者
#   - 事件队列深度 32
#   - 内存池双池 8KB（通用 + 事件）
#   - 最多 16 个定时器
#   - 最多 12 个模块
#   - Shell 启用（无统计）
#   - 内存跟踪启用（64 条）
#   - 日志缓冲 128 条
#   - 看门狗软件模式
#
# =============================================================================

# =============================================================================
# 基础系统配置 - 平衡
# =============================================================================

# 调试与控制台 - 保留基本功能
CONFIG_SHELL=y
CONFIG_CONSOLE=y
CONFIG_SERIAL=y
CONFIG_UART_CONSOLE=y
CONFIG_PRINTK=y
CONFIG_EARLY_CONSOLE=y
CONFIG_BOOT_BANNER=n

# 日志系统 - 信息级别
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3
CONFIG_LOG_MAX_LEVEL=3
CONFIG_LOG_OVERRIDE_LEVEL=3
CONFIG_LOG_RUNTIME_FILTERING=n
CONFIG_LOG_MODE_IMMEDIATE=y
CONFIG_LOG_BACKEND_UART=y

# 内核日志级别
CONFIG_KERNEL_LOG_LEVEL_ERR=y
CONFIG_ARCH_LOG_LEVEL_ERR=y
CONFIG_MPU_LOG_LEVEL_OFF=y

# 断言启用（调试用）
CONFIG_DEBUG=n
CONFIG_ASSERT=y

# =============================================================================
# 内核内存配置 - 优化
# =============================================================================

# Heap 降至 16KB
CONFIG_HEAP_MEM_POOL_SIZE=16384

# 线程栈优化
CONFIG_MAIN_STACK_SIZE=3072
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=1536
CONFIG_EVENT_DISPATCHER_STACK_SIZE=1536

# 静态内存池 8KB
CONFIG_SYS_MEMORY_POOL_SIZE=8192

# =============================================================================
# 核心功能 - 平衡
# =============================================================================

# 事件系统 - 中等配置
CONFIG_EVENT_SYSTEM=y
CONFIG_EVENT_QUEUE_SIZE=32
CONFIG_EVENT_MAX_SUBSCRIBERS=8
CONFIG_EVENT_DISPATCHER_PRIORITY=5

# 事件 Slab 内存配置 - 平衡（~8KB）
CONFIG_EVENT_SLAB_ENABLE=y
CONFIG_EVENT_STRUCT_SIZE_64=y
CONFIG_EVENT_SLAB_CRITICAL_COUNT=4
CONFIG_EVENT_SLAB_HIGH_COUNT=8
CONFIG_EVENT_SLAB_NORMAL_COUNT=16
CONFIG_EVENT_SLAB_LARGE_ENABLE=y
CONFIG_EVENT_SLAB_LARGE_256_COUNT=4
CONFIG_EVENT_SLAB_LARGE_1K_COUNT=2
CONFIG_EVENT_SLAB_LARGE_4K_COUNT=0

# 事件扩展功能
CONFIG_EVENT_RUNTIME_STATUS=y
CONFIG_EVENT_SLAB_EXHAUSTED_CB=n
CONFIG_EVENT_DEBUG_MEM=n

# 模块管理器 - 中等
CONFIG_MODULE_MANAGER=y
CONFIG_MAX_MODULES=12

# 系统服务 - 启用核心功能
CONFIG_SYS_LOG_LEVEL=3
CONFIG_SYS_LOG_ENABLE=y
CONFIG_SYS_MEMORY_ENABLE=y
CONFIG_SYS_TIMER_ENABLE=y

# 看门狗 - 软件模式
CONFIG_SYS_WATCHDOG_ENABLE=y
CONFIG_SYS_WATCHDOG_TIMEOUT_MS=8000
CONFIG_SYS_WATCHDOG_FORCE_RESET=n
CONFIG_SYS_WATCHDOG_DEFAULT_MODE=0

# =============================================================================
# 应用功能 - 部分启用
# =============================================================================

CONFIG_APP_ENABLE_SHELL=y
CONFIG_APP_ENABLE_STATS=n
CONFIG_APP_ENABLE_LOG_DUMP=y
CONFIG_APP_HEARTBEAT_INTERVAL_MS=1000

# 示例模块 - 按需启用
CONFIG_EXAMPLE_MODULE_A_ENABLE=y
CONFIG_EXAMPLE_MODULE_B_ENABLE=n

# =============================================================================
# KV 存储 - RAM 模式
# =============================================================================

CONFIG_APP_KV_ENABLE=y
CONFIG_APP_KV_MAX_ENTRIES=8
CONFIG_APP_KV_KEY_MAX_LEN=16
CONFIG_APP_KV_VALUE_MAX_LEN=64
CONFIG_APP_KV_PERSIST=n

# =============================================================================
# Thread IPC - 平衡配置（目标 ~4KB）
# =============================================================================
#
# 内存占用估算：
#   - 线程栈: 1024 × 2 = 2048 B
#   - 请求队列: 4 × 56B = 224 B
#   - 响应队列: 4 × 48B = 192 B
#   - Pending 表: 8 × 76B = 608 B
#   - Future 池: 8 × 52B = 416 B
#   - 基础小计: ~3488 B (~3.4 KB)
#   - 共享内存池: 4 × 256B + 元数据 = ~1216 B (~1.2 KB)
#   - 总计: ~4.7 KB
#
# 适用场景：
#   - 64KB SRAM 或以上
#   - 中等并发请求（≤4）
#   - 数据量中等（<256 字节）
#
# 如需启用，取消以下注释：
# CONFIG_THREAD_IPC_SERVICE=y
# CONFIG_THREAD_IPC_SERVICE_STACK_SIZE=1024
# CONFIG_THREAD_IPC_SERVICE_PRIORITY=5
# CONFIG_THREAD_IPC_SERVICE_LOG_LEVEL=1
# CONFIG_THREAD_IPC_SERVICE_MAX_PENDING_REQUESTS=8
# CONFIG_THREAD_IPC_SERVICE_REQUEST_QUEUE_SIZE=4
# CONFIG_THREAD_IPC_SERVICE_RESPONSE_QUEUE_SIZE=4
# CONFIG_THREAD_IPC_SERVICE_SHARED_MEM=y
# CONFIG_THREAD_IPC_SERVICE_SHARED_MEM_POOL_SIZE=4
# CONFIG_THREAD_IPC_SERVICE_SHARED_MEM_BLOCK_SIZE=256
# CONFIG_THREAD_IPC_SERVICE_SHARED_MEM_LOG_LEVEL=1
# CONFIG_THREAD_IPC_SERVICE_EXAMPLE=n

# 默认禁用
# CONFIG_THREAD_IPC_SERVICE=n
# CONFIG_THREAD_IPC_SERVICE_EVENT_BRIDGE=n

# =============================================================================
# 其他模块选项 - 按需
# =============================================================================

# CONFIG_MODULE_MANAGER_RUNTIME_DEPENDENCIES=n
# CONFIG_EXAMPLE_MODULE_GPIO=n
# CONFIG_EXAMPLE_MODULE_UART=n
# CONFIG_EXAMPLE_MODULE_MULTI_DEP=n
# CONFIG_EXAMPLE_MODULE_THREAD_IPC=n

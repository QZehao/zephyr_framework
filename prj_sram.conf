# SRAM1/SRAM2/SRAM3 内存利用配置说明
# 适用于 STM32L4R5ZI (Nucleo-L4R5ZI-P)
#
# =============================================================================
# 快速开始
# =============================================================================
#
# 工程根目录 app.overlay 删除 SoC 默认拆分的 sram0/sram1/sram2 节点，并定义
# 0x20000000 起连续 640KB 作为 zephyr,sram（与 RM0432 一致）。Zephyr 4.x 由 CMake
# 生成链接脚本，勿再手写 boards/*.ld 使用 INCLUDE linker-base.ld（已不存在）。
#
# 编译命令:
#   west build -b nucleo_l4r5zi
#
# =============================================================================
# 内存布局
# =============================================================================
# STM32L4R5ZI 内存映射:
#   - FLASH   : 2MB      @ 0x08000000
#   - SRAM1   : 192KB    @ 0x20000000  (主 RAM，用于 .data/.bss)
#   - SRAM2   : 64KB     @ 0x20030000  (映射后地址，用于线程栈)
#   - SRAM3   : 384KB    @ 0x20040000  (用于 Heap 和大型缓冲区)
#
# 默认配置（未优化前）:
#   - RAM 使用：192KB (全部 SRAM1)
#   - SRAM1 使用率：~99.64% (溢出风险)
#   - SRAM2 使用：0%
#   - SRAM3 使用：0%
#
# 优化后配置:
#   - SRAM1: .data/.bss 段 (约 80-120KB)
#   - SRAM2: 线程栈 + ISR 栈 (约 10-20KB)
#   - SRAM3: Heap 64KB + 剩余可用 320KB
#   - 总可用 RAM: 192 + 64 + 384 = 640KB
#
# =============================================================================
# 文件说明
# =============================================================================
#
# prj.conf
#   - 主配置文件（含 CONFIG_HEAP_MEM_POOL_SIZE 等）
#
# app.overlay
#   - 扩展主 RAM 为 640KB，供链接器与 Kconfig CONFIG_SRAM_SIZE 使用
#
# =============================================================================
# 配置参数
# =============================================================================

# Heap 大小（放到 SRAM3）
# 默认 64KB，如需更大缓冲区可增加
CONFIG_HEAP_MEM_POOL_SIZE=65536

# 线程栈大小（放到 SRAM2）
# 默认偏小，容易在演示/bridge 逻辑较复杂时触发栈溢出
CONFIG_THREAD_IPC_SERVICE_STACK_SIZE=2048

# 事件调度器栈大小（放到 SRAM2）
CONFIG_EVENT_DISPATCHER_STACK_SIZE=4096

# =============================================================================
# 高级选项（需要时启用）
# =============================================================================

# 将日志缓冲区放到 SRAM2
# CONFIG_LOG_BUFFER_IN_SRAM2=y

# 将 DMA 缓冲区放到 SRAM3（零访问延迟）
# CONFIG_DMA_BUFFERS_IN_SRAM3=y

# 增大 SRAM3 heap 到 128KB 或更大
# CONFIG_HEAP_MEM_POOL_SIZE=131072

# =============================================================================
# 内存分配策略
# =============================================================================
#
# SRAM1 (192KB @ 0x20000000):
#   - .text 段（代码）
#   - .data 段（已初始化全局变量）
#   - .bss 段（未初始化全局变量）
#   - 内核数据结构
#
# SRAM2 (64KB @ 0x20030000):
#   - 线程栈（THREAD_IPC_SERVICE 栈 1280 字节 × 2 = 2560 字节）
#   - 事件调度器栈（2048 字节）
#   - ISR 中断栈
#   - 剩余空间：约 50KB
#
# SRAM3 (384KB @ 0x20040000):
#   - Heap 内存池（CONFIG_HEAP_MEM_POOL_SIZE，默认 64KB）
#   - 大型缓冲区（日志、网络缓冲区等）
#   - DMA 缓冲区（需要时）
#   - 剩余空间：约 320KB
#
# =============================================================================
# 验证方法
# =============================================================================
#
# 1. 编译项目:
#    west build -b nucleo_l4r5zi
#
# 2. 查看内存使用:
#    编译输出会显示:
#    Memory region         Used Size  Region Size  %age Used
#               FLASH:       XXXX B         2 MB      X.XX%
#                 RAM:       XXXX B       192 KB      X.XX%
#               SRAM2:       XXXX B        64 KB      X.XX%
#               SRAM3:       XXXX B       384 KB      X.XX%
#
# 3. 查看 map 文件:
#    build/zephyr/zephyr.map
#
# =============================================================================
# 故障排除
# =============================================================================
#
# 问题：overlay 报 parse error
# 解决：/delete-node/ 必须写在 overlay 文件顶层，不能放在 / { } 内部
#
# 问题：SRAM2/SRAM3 使用率仍为 0%
# 解决：清除构建缓存后重新编译
#    west build -t clean
#    west build
#
# 问题：运行时崩溃
# 解决：检查 linker 脚本中的内存地址是否正确
#    STM32L4R5ZI 正确地址:
#    - SRAM1: 0x20000000
#    - SRAM2: 0x20030000 (映射后)
#    - SRAM3: 0x20040000

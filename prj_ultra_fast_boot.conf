# ============================================================================
# 极限启动优化配置 (< 50ms)
# ============================================================================

# 完全禁用所有日志
CONFIG_SYS_LOG_ENABLE=n
CONFIG_LOG=n
CONFIG_LOG_BACKEND_UART=n
CONFIG_LOG_BACKEND_RTT=n
CONFIG_KERNEL_LOGGER=n

# 禁用不必要的调试符号
CONFIG_DEBUG_SYMBOLS=n
CONFIG_OPTIMIZE_FAST=y

# 最小化内存占用
CONFIG_SYS_MEMORY_POOL_SIZE=2048
CONFIG_EVENT_QUEUE_SIZE=16
CONFIG_EVENT_MAX_SUBSCRIBERS=4

# 禁用所有可选服务
CONFIG_SYS_WATCHDOG_ENABLE=n
CONFIG_SYS_LOG_ENABLE=n
CONFIG_APP_KV_PERSIST=n
CONFIG_THREAD_IPC_SERVICE=n

# 禁用心跳定时器
CONFIG_APP_ENABLE_HEARTBEAT=n

# 启用最小化模式
CONFIG_SYS_LOG_LEVEL=0
CONFIG_KERNEL_LOG_LEVEL=0

# 优化 Zephyr 核心
CONFIG_PREEMPT_ENABLED=y
CONFIG_TIMESLICING=n
CONFIG_NUM_PREEMPT_PRIORITIES=16

# 禁用不必要的特性
CONFIG_BOOT_BANNER=n
CONFIG_BOOT_DELAY=0

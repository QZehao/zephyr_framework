# ============================================================================
# 快速启动优化配置 (< 100ms)
# ============================================================================

# 禁用日志系统以节省 94ms
CONFIG_SYS_LOG_ENABLE=n

# 禁用日志着色和时间戳
CONFIG_SYS_LOG_ENABLE_COLORS=n
CONFIG_SYS_LOG_ENABLE_TIMESTAMP=n

# 禁用详细的初始化输出
CONFIG_SYS_LOG_LEVEL=0

# 最小化事件系统日志
CONFIG_LOG_MODE_IMMEDIATE=n

# 禁用不必要的子系统
# CONFIG_THREAD_IPC_SERVICE=n
# CONFIG_APP_KV_PERSIST=n

# 优化内存分配
CONFIG_SYS_MEMORY_POOL_SIZE=4096

# 最小化队列深度
CONFIG_EVENT_QUEUE_SIZE=32

# 减少订阅者数量
CONFIG_EVENT_MAX_SUBSCRIBERS=8

# 禁用看门狗初始化
CONFIG_SYS_WATCHDOG_ENABLE=n

# Zephyr 核心优化
CONFIG_KERNEL_LOGGER=n
CONFIG_LOG_BACKEND_UART=n
CONFIG_LOG_BACKEND_SERIAL=n

# 禁用内存统计
CONFIG_SYS_MEMORY_ENABLE_STATS=n

# 启用最小化启动
CONFIG_DEBUG_OPTIMIZATIONS=y
CONFIG_OPTIMIZE_FAST=y

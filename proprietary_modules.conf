# =============================================================================
# Proprietary Modules Repository Configuration
# =============================================================================
# This file defines the Git repository URLs for each proprietary module.
#
# Format:
#   MODULE_NAME=REPOSITORY_URL
#
# Usage:
#   1. Copy this file to "proprietary_modules.local.conf" and customize
#   2. Or set environment variables: PROPRIETARY_MODULE_<NAME>_URL
#
# Priority:
#   1. Environment variable: PROPRIETARY_MODULE_<NAME>_URL
#   2. Local config file: proprietary_modules.local.conf
#   3. This file: proprietary_modules.conf
#   4. Default: empty (skip module)
# =============================================================================

# Main proprietary modules repository (parent of all submodules)
# Leave empty to use the URL from .gitmodules
PROPRIETARY_REPO=

# Individual module repositories
# Uncomment and set the URL for each module you have access to

# Event System Pro - Enhanced event system with priority queues and filters
EVENT_SYSTEM_PRO_URL=https://gitee.com/Qzehao/event_system_pro.git

# Module Manager Pro - Advanced module management with dependencies
MODULE_MANAGER_PRO_URL=https://gitee.com/Qzehao/module_manager_pro.git

# Mesh Communication - Multi-device mesh networking
MESH_COMMUNICATION_URL=https://gitee.com/Qzehao/mesh_communication.git

# Security Crypto - Encryption and security utilities
SECURITY_CRYPTO_URL=https://gitee.com/Qzehao/security_crypto.git

# OTA Manager - Over-the-air update management
OTA_MANAGER_URL=https://gitee.com/Qzehao/ota_manager.git

# USB Host CDC ECM - USB CDC ECM driver for cellular modems
USB_HOST_CDC_ECM_URL=https://gitee.com/Qzehao/usb_host_cdc_ecm.git

# USB Host RNDIS - USB RNDIS driver for cellular modems
# USB_HOST_RNDIS_URL=https://gitee.com/Qzehao/usb_host_rndis.git

# Cloud Connector - Cloud platform integration
# CLOUD_CONNECTOR_URL=https://gitee.com/Qzehao/cloud_connector.git

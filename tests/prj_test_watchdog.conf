# 硬件看门狗测试配置
# 用法: west build -b mimxrt1050_fire tests/ -- -DCONF_FILE="prj.conf;prj_test_watchdog.conf"

# 使用硬件看门狗模式（1=HARDWARE, 2=DUAL）
CONFIG_SYS_WATCHDOG_DEFAULT_MODE=1

# 缩短超时时间用于测试（3秒）
CONFIG_SYS_WATCHDOG_TIMEOUT_MS=3000

# 测试时不启用复位（开发模式）
# CONFIG_SYS_WATCHDOG_FORCE_RESET=n

# 启用 Zephyr 看门狗驱动
CONFIG_WATCHDOG=y

# 增加日志级别以便查看详细输出
CONFIG_SYS_LOG_LEVEL=4
CONFIG_LOG_LEVEL_DBG=y

# 单元测试（ztest）— 与主应用分离构建，不链接 IPC / 示例模块

CONFIG_ZTEST=y
CONFIG_TEST=y

CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL_INFO=y

# 事件系统 event_create / event_publish_copy 依赖内核堆
CONFIG_HEAP_MEM_POOL_SIZE=8192
CONFIG_MAIN_STACK_SIZE=4096

# 测试构建不启用应用内 Thread IPC（主 CMake 未编译 ipc_service 源文件）
CONFIG_THREAD_IPC_SERVICE=n
CONFIG_EXAMPLE_MODULE_THREAD_IPC=n
CONFIG_THREAD_IPC_SERVICE_EVENT_BRIDGE=n

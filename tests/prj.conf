# 单元测试（ztest）— 精简版适应硬件 RAM 限制

CONFIG_ZTEST=y
CONFIG_TEST=y

# 最小日志
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=1
CONFIG_LOG_MODE_MINIMAL=y

# 堆和栈配置
CONFIG_HEAP_MEM_POOL_SIZE=2048
CONFIG_MAIN_STACK_SIZE=3072
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=1024

# Ztest 线程栈
CONFIG_ZTEST_STACK_SIZE=3072

# 事件系统 Slab 配置（最小化）
CONFIG_EVENT_SLAB_ENABLE=y
CONFIG_EVENT_SLAB_NORMAL_COUNT=4
CONFIG_EVENT_SLAB_HIGH_COUNT=0
CONFIG_EVENT_SLAB_CRITICAL_COUNT=0
CONFIG_EVENT_SLAB_LARGE_ENABLE=n
CONFIG_EVENT_RUNTIME_STATUS=n
CONFIG_EVENT_SLAB_EXHAUSTED_CB=n
CONFIG_EVENT_DEBUG_MEM=n
CONFIG_EVENT_STRUCT_SIZE_64=y

# 禁用系统内存管理器（使用 Zephyr heap 即可）
CONFIG_SYS_MEMORY_ENABLE=n

# 禁用 IPC 服务
CONFIG_THREAD_IPC_SERVICE=n

# 禁用示例模块测试
CONFIG_EXAMPLE_MODULE_UART=n
CONFIG_EXAMPLE_MODULE_THREAD_IPC=n
CONFIG_EXAMPLE_MODULE_GPIO=n
CONFIG_EXAMPLE_MODULE_A_ENABLE=n
CONFIG_EXAMPLE_MODULE_B_ENABLE=n
CONFIG_EXAMPLE_MODULE_MULTI_DEP=n

# 禁用看门狗
CONFIG_WATCHDOG=n
CONFIG_SYS_WATCHDOG_ENABLE=n

# Data Bus（精简配置适配测试环境）
CONFIG_DATA_BUS=y
CONFIG_DATA_BUS_CHANNEL_NAME_MAX=16
CONFIG_DATA_BUS_MAX_CHANNELS=4
CONFIG_DATA_BUS_MAX_CONSUMERS_PER_CHANNEL=4
CONFIG_DATA_BUS_CHANNEL_QUEUE_DEPTH=8
CONFIG_DATA_BUS_MAX_BLOCKS=16
CONFIG_DATA_BUS_DISPATCHER_STACK_SIZE=1024
CONFIG_DATA_BUS_DISPATCHER_PRIORITY=5
CONFIG_DATA_BUS_SLAB_ENABLE=y
CONFIG_DATA_BUS_SLAB_256_COUNT=4
CONFIG_DATA_BUS_SLAB_1K_COUNT=2
CONFIG_DATA_BUS_SLAB_4K_COUNT=1
CONFIG_DATA_BUS_EVENT_BRIDGE=n

# 减少内核对象
CONFIG_MAX_THREAD_BYTES=1
CONFIG_NUM_COOP_PRIORITIES=8
CONFIG_NUM_PREEMPT_PRIORITIES=8

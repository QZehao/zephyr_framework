# =============================================================================
# 极限配置 - 目标框架 <10KB，预留 22KB 给 APP（总计 32KB SRAM）
# =============================================================================
#
# 使用方法：
#   west build -b mimxrt1050_fire/mimxrt1052/qspi . -DCONF_FILE="prj.conf;prj_tiny.conf"
#
# 裁剪策略：
#   - 事件类型：256 → 16
#   - 订阅者/类型：16 → 2
#   - 事件队列：64 → 8
#   - 禁用 Shell/日志缓冲/统计
#   - Heap：64KB → 2KB
#   - 内存池：8KB → 禁用
#   - 栈大小：大幅缩减
#
# =============================================================================

# =============================================================================
# 基础系统配置 - 最小化
# =============================================================================

# 禁用所有调试功能
CONFIG_SHELL=n
CONFIG_CONSOLE=n
CONFIG_SERIAL=n
CONFIG_UART_CONSOLE=n
CONFIG_PRINTK=y
CONFIG_EARLY_CONSOLE=n
CONFIG_BOOT_BANNER=n

# 日志系统 - 禁用
CONFIG_LOG=n

# 断言禁用
CONFIG_DEBUG=n
CONFIG_ASSERT=n

# =============================================================================
# 内核内存配置 - 极限缩减
# =============================================================================

# 启用内核内存池（Heap）
CONFIG_KERNEL_MEM_POOL=y

# Heap 降至 2KB（仅供事件系统内部动态分配）
CONFIG_HEAP_MEM_POOL_SIZE=2048

# 线程栈缩减
CONFIG_MAIN_STACK_SIZE=1024
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=512
CONFIG_EVENT_DISPATCHER_STACK_SIZE=512

# 禁用静态内存池
CONFIG_SYS_MEMORY_POOL_SIZE=0
CONFIG_SYS_MEMORY_ENABLE=n

# =============================================================================
# 事件系统 - 极限配置
# =============================================================================

CONFIG_EVENT_SYSTEM=y
CONFIG_EVENT_QUEUE_SIZE=8
CONFIG_EVENT_MAX_SUBSCRIBERS=2
CONFIG_EVENT_MAX_TYPES=16
CONFIG_EVENT_DISPATCHER_PRIORITY=5

# =============================================================================
# 模块管理器 - 最小化
# =============================================================================

CONFIG_MODULE_MANAGER=y
CONFIG_MAX_MODULES=4

# =============================================================================
# 系统服务 - 仅核心
# =============================================================================

CONFIG_SYS_LOG_LEVEL=0
CONFIG_SYS_LOG_ENABLE=n
CONFIG_SYS_TIMER_ENABLE=y
CONFIG_SYS_WATCHDOG_ENABLE=n

# =============================================================================
# 应用功能 - 全部禁用
# =============================================================================

CONFIG_APP_ENABLE_SHELL=n
CONFIG_APP_ENABLE_STATS=n
CONFIG_APP_ENABLE_LOG_DUMP=n
CONFIG_APP_HEARTBEAT_INTERVAL_MS=0

# 示例模块 - 全部禁用
CONFIG_EXAMPLE_MODULE_A_ENABLE=n
CONFIG_EXAMPLE_MODULE_B_ENABLE=n

# KV 存储 - 禁用
CONFIG_APP_KV_ENABLE=n
CONFIG_APP_KV_PERSIST=n

# =============================================================================
# Thread IPC - 禁用
# =============================================================================

CONFIG_THREAD_IPC_SERVICE=n
CONFIG_THREAD_IPC_SERVICE_EVENT_BRIDGE=n

# =============================================================================
# 其他优化
# =============================================================================

# 禁用未使用的内核特性
CONFIG_USERSPACE=n
CONFIG_THREAD_NAME=n
CONFIG_THREAD_MONITOR=n
CONFIG_THREAD_RUNTIME_STATS=n
CONFIG_SCHED_SCALABLE=n
CONFIG_WAITQ_SCALABLE=n

# 编译优化
CONFIG_SIZE_OPTIMIZATIONS=y
CONFIG_SPEED_OPTIMIZATIONS=n
CONFIG_DEBUG_OPTIMIZATIONS=n
